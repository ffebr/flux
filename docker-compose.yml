version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: ${REDIS_HOST:-flux-redis}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      --requirepass ${REDIS_PASSWORD:-2111}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flux-api
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - APP_PORT=8080
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-2111}
      - REDIS_USER=${REDIS_USER:-default}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
